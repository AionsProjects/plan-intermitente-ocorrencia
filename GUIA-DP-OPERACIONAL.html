<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<style>
:root{
  --bg1:#040406;--bg2:#08080b;--bg3:#0e0e12;
  --gold:#e8c275;--gold-deep:#caa052;--blue:#5f86ff;--blue-soft:#9db8ff;
  --purple:#a87bff;--purple-deep:#863bff;
  --ink:#f5f5f8;--ink-dim:rgba(245,245,248,.66);--ink-faint:rgba(245,245,248,.4);
  --glass:rgba(16,16,21,.72);--glass-2:rgba(22,22,29,.9);
  --border:rgba(190,192,200,.13);--border-2:rgba(200,202,210,.26);
  --rm:#ef6b6b;--caju:#e8c275;--monday:#5f86ff;--drive:#3fcf79;--registry:#a87bff;--nexti:#7c8aa3;
  --r:18px;--r-sm:11px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{background:var(--bg1);color:var(--ink);font-family:"Geist",system-ui,sans-serif;font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;overflow:hidden}
.aurora{position:fixed;inset:0;z-index:-2;background:
  radial-gradient(1100px 760px at 10% -8%,rgba(95,134,255,.13),transparent 55%),
  radial-gradient(900px 640px at 96% 6%,rgba(232,194,117,.1),transparent 55%),
  radial-gradient(1000px 720px at 72% 108%,rgba(134,59,255,.12),transparent 55%),
  linear-gradient(165deg,var(--bg1),var(--bg2) 48%,var(--bg3))}
.layout{display:grid;grid-template-columns:296px 1fr;height:100vh}
/* sidebar */
aside{height:100vh;overflow-y:auto;padding:24px 16px;background:var(--glass);backdrop-filter:blur(22px);border-right:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:12px;padding:4px 6px 18px;border-bottom:1px solid var(--border);margin-bottom:16px}
.brand svg{width:34px;height:34px;filter:drop-shadow(0 3px 14px rgba(255,255,255,.25))}
.brand .bt{font-family:"Instrument Serif",serif;font-size:24px;line-height:1;letter-spacing:.5px}
.brand .bs{font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.26em;margin-top:4px}
.nav-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.24em;color:var(--ink-faint);padding:4px 8px;margin:14px 0 4px}
.doc-link,.view-link{display:flex;flex-direction:column;width:100%;text-align:left;gap:2px;padding:11px 13px;margin:4px 0;border-radius:var(--r-sm);background:transparent;border:1px solid transparent;color:var(--ink-dim);cursor:pointer;font-family:inherit;transition:.16s}
.doc-link:hover,.view-link:hover{background:rgba(255,255,255,.045);border-color:var(--border);color:var(--ink)}
.doc-link.active,.view-link.active{background:linear-gradient(135deg,rgba(232,194,117,.18),rgba(95,134,255,.1));border-color:rgba(232,194,117,.42);color:var(--ink);box-shadow:0 8px 26px -12px rgba(232,194,117,.6)}
.dl-t{font-weight:600;font-size:13.5px}.dl-s{font-size:11px;color:var(--ink-faint)}
.search{width:100%;margin:12px 0 4px;padding:9px 12px;border-radius:var(--r-sm);background:rgba(0,0,0,.4);border:1px solid var(--border);color:var(--ink);font-family:inherit;font-size:13px;outline:none}
.search:focus{border-color:rgba(232,194,117,.5)}
.toc{margin-top:16px;border-top:1px solid var(--border);padding-top:12px}
.toc a{display:block;padding:4px 8px;font-size:12px;color:var(--ink-faint);text-decoration:none;border-radius:6px;border-left:2px solid transparent}
.toc a:hover{color:var(--ink);background:rgba(255,255,255,.03)}
.toc a.h3{padding-left:20px;font-size:11px}
/* main */
main{height:100vh;overflow-y:auto;position:relative}
.view{display:none}.view.active{display:block}
.docwrap{padding:46px 60px 120px;max-width:1060px}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:30px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.chip{font-size:11px;padding:5px 12px;border-radius:999px;background:rgba(232,194,117,.12);border:1px solid rgba(232,194,117,.3);color:var(--gold)}
.chip.blue{background:rgba(95,134,255,.12);border-color:rgba(95,134,255,.3);color:var(--blue-soft)}
/* markdown */
.md h1{font-family:"Instrument Serif",serif;font-size:46px;font-weight:400;line-height:1.08;margin:.1em 0 .5em;background:linear-gradient(110deg,#fff 20%,var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.md h2{font-family:"Instrument Serif",serif;font-size:30px;font-weight:400;margin:1.7em 0 .5em;padding-bottom:.3em;border-bottom:1px solid var(--border);color:#fff}
.md h3{font-size:18px;font-weight:600;margin:1.5em 0 .4em;color:var(--gold)}
.md h4{font-size:14.5px;font-weight:600;margin:1.1em 0 .3em;color:var(--blue-soft)}
.md p,.md li{color:var(--ink-dim)}
.md a{color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(232,194,117,.28)}
.md a:hover{border-bottom-color:var(--gold)}
.md strong{color:var(--ink);font-weight:600}
.md code{font-family:"Geist Mono",monospace;font-size:.85em;background:rgba(134,59,255,.15);color:var(--purple);padding:.12em .42em;border-radius:5px;border:1px solid rgba(134,59,255,.22)}
.md pre{background:var(--glass-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:15px 17px;overflow-x:auto}
.md pre code{background:none;border:none;color:#e6e6ea;padding:0;font-size:12.5px;line-height:1.55}
.md blockquote{border-left:3px solid var(--gold);background:rgba(232,194,117,.07);margin:1em 0;padding:.55em 1.1em;border-radius:0 var(--r-sm) var(--r-sm) 0}
.md table{border-collapse:collapse;width:100%;margin:1.1em 0;font-size:13px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
.md th{background:rgba(95,134,255,.14);color:#fff;font-weight:600;text-align:left;padding:10px 13px;position:sticky;top:0}
.md td{padding:9px 13px;border-bottom:1px solid var(--border);color:var(--ink-dim);vertical-align:top}
.md tbody tr:nth-child(even) td{background:rgba(255,255,255,.022)}
.md tr:hover td{background:rgba(95,134,255,.06)}
.md hr{border:none;border-top:1px solid var(--border);margin:2em 0}
.md ul,.md ol{padding-left:1.35em}
.md .mermaid-hidden{display:none}
.md .flow-hint{background:linear-gradient(135deg,rgba(95,134,255,.12),rgba(232,194,117,.08));border:1px solid var(--border-2);border-radius:var(--r-sm);padding:11px 15px;font-size:13px;color:var(--ink-dim);margin:1em 0}
/* dots (badges de ferramenta) */
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin:0 1px;vertical-align:middle;box-shadow:0 0 7px currentColor}
.dot.rm{background:var(--rm);color:var(--rm)}.dot.caju{background:var(--caju);color:var(--caju)}
.dot.monday{background:var(--monday);color:var(--monday)}.dot.drive{background:var(--drive);color:var(--drive)}
.dot.registry{background:var(--registry);color:var(--registry)}.dot.nexti{background:var(--nexti);color:var(--nexti)}
.mk{display:inline-block;font-weight:700;text-align:center}
.mk.yes{width:9px;height:9px;border-radius:50%;background:var(--drive);box-shadow:0 0 7px var(--drive);vertical-align:middle}
.mk.no{color:var(--ink-faint)}
.mk.warn{color:var(--caju)}
/* ===== VISUALIZADOR (inline por ficha) ===== */
.flowwrap{margin:14px 0 28px}
.flowlabel{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--gold);margin-bottom:7px;opacity:.85}
.flowbox{border:1px solid var(--border-2);border-radius:var(--r);overflow:hidden;margin:16px 0 26px;background:var(--glass-2);box-shadow:0 20px 50px -28px rgba(0,0,0,.8)}
.flowbar{display:flex;align-items:center;gap:13px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.25);flex-wrap:wrap}
.flow-title{font-family:"Instrument Serif",serif;font-size:18px;color:#fff}
.flow-legend{display:flex;gap:11px;margin-left:auto;font-size:10.5px;color:var(--ink-faint);flex-wrap:wrap}
.flow-legend span{display:inline-flex;align-items:center;gap:5px}
.flow-meta{font-size:11.5px;color:var(--ink-faint);background:rgba(255,255,255,.04);padding:3px 9px;border-radius:999px}
.flow-body{position:relative;height:470px;overflow:hidden;background:
  radial-gradient(circle at 1px 1px, rgba(255,255,255,.05) 1px, transparent 0) 0 0/22px 22px,
  linear-gradient(180deg,#0c0c10,#0a0a0d)}
.flow-svg{width:100%;height:100%;cursor:grab;display:block}
.flow-svg.grabbing{cursor:grabbing}
.fnode rect{transition:filter .15s,stroke .15s}
.fnode:hover rect{filter:brightness(1.25)}
.fnode.sel rect{stroke:var(--gold);stroke-width:2.5}
.fnode text{pointer-events:none;font-family:"Geist",sans-serif}
.fhint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:11.5px;color:var(--ink-faint);background:var(--glass);padding:6px 14px;border-radius:999px;border:1px solid var(--border)}
.fzoom{position:absolute;top:14px;right:16px;display:flex;flex-direction:column;gap:6px}
.fzoom button{width:34px;height:34px;border-radius:9px;background:var(--glass-2);border:1px solid var(--border-2);color:var(--ink);font-size:17px;cursor:pointer}
.fzoom button:hover{border-color:var(--gold);color:var(--gold)}
/* painel do node */
.npanel{position:absolute;top:0;right:0;width:360px;height:100%;background:var(--glass-2);backdrop-filter:blur(26px);border-left:1px solid var(--border-2);padding:26px 24px;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;z-index:10;box-shadow:-20px 0 50px -20px rgba(0,0,0,.7)}
.npanel.open{transform:none}
.npanel .nclose{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--ink-dim);cursor:pointer;font-size:15px}
.npanel .ntype{font-size:10.5px;text-transform:uppercase;letter-spacing:.2em;color:var(--ink-faint);margin-bottom:6px}
.npanel .nname{font-family:"Instrument Serif",serif;font-size:25px;line-height:1.15;margin:0 0 14px;color:#fff}
.npanel .ntool{display:inline-flex;align-items:center;gap:7px;font-size:12px;padding:5px 12px;border-radius:999px;border:1px solid var(--border-2);margin-bottom:18px;color:var(--ink-dim)}
.npanel .ndesc{font-size:14px;line-height:1.7;color:var(--ink-dim);border-top:1px solid var(--border);padding-top:16px}
.npanel .nclabel{font-size:9.5px;text-transform:uppercase;letter-spacing:.2em;color:var(--ink-faint);margin:18px 0 7px}
.npanel .ncontent{font-family:"Geist Mono",monospace;font-size:11px;line-height:1.55;color:#cdd0d8;background:#0b0b0e;border:1px solid var(--border);border-radius:9px;padding:12px;overflow:auto;max-height:300px;white-space:pre-wrap;word-break:break-word}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.13);border-radius:6px}::-webkit-scrollbar-track{background:transparent}
/* ===== MODO PDF (?print=1) ===== */
.printing aside{display:none}
.printing .layout{grid-template-columns:1fr}
.printing main{height:auto;overflow:visible}
.printing .view{display:none}
.printing .view.active{display:block}
.printing .docwrap{max-width:none;padding:26px 34px}
.printing .npanel,.printing .fzoom,.printing .fhint{display:none!important}
.printing .flow-body{height:600px}
@media print{
  @page{size:A4;margin:11mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  html,body{overflow:visible!important;height:auto!important}
  .aurora{position:absolute}
  .view.active+.view.active{break-before:page}
  .flowwrap,.flowbox,table,.md pre,blockquote{break-inside:avoid}
  .md h1,.md h2{break-after:avoid}
}
@media(max-width:880px){.layout{grid-template-columns:1fr}aside{display:none}.docwrap{padding:24px 18px 80px}.npanel{width:88%}}
</style>
</head>

# 👥 Guia do DP & Operacional — o que cada um pode e deve fazer

> Manual de uso completo do app **Plano de Intermitentes**, por papel. Quem pode entrar, o que cada papel vê, e o passo a passo de **todas** as ações. Detalhe técnico dos WFs → **Automações**. Plataforma/arquitetura → **Visão & Plataforma**.

**App:** `https://plan-intermitente-ocorrencia.vercel.app`

---

## 1. Acesso — quem pode entrar
- **Login Google** (SSO) com conta do domínio **`@contatoserv.com.br`**. Também há **login local** (email/CPF + senha) pra contas sem Google (ex.: 1º admin).
- **1º acesso:** completar cadastro (nome, sobrenome, **CPF**) e o papel é definido. Sem isso, não libera.
- **Conta desativada** pelo Admin → sai na hora (sessão revogada).
- Quem **não** está cadastrado/ativo **não entra**. Não há auto-cadastro aberto: o acesso depende de a conta existir no sistema.

## 2. Papéis — o que cada um vê e pode
Hierarquia: **Admin > DP > RH / Operacional**.

| Ação / tela | Operacional | RH | DP | Admin |
|---|:--:|:--:|:--:|:--:|
| Entrar / Hub | ✅ | ✅ | ✅ | ✅ |
| Convocar intermitente | ✅ | ✅ | ✅ | ✅ |
| Registrar ocorrência (link `/preencher`) | ✅ | ✅ | ✅ | ✅ |
| Corrigir lançamento (protocolo) | ✅ | ✅ | ✅ | ✅ |
| Atestados / declarações | ✅ | ✅ | ✅ | ✅ |
| Descontos manuais (link `/descontos`) | ✅ | ✅ | ✅ | ✅ |
| **Ponto facultativo** (desconto em massa) | ❌ | ❌ | ✅ | ✅ |
| Ver **atividade de todos** | só a própria | só a própria | ✅ todos | ✅ todos |
| **Gerenciar contas** (papéis, ativar, senha) | ❌ | ❌ | ❌ | ✅ |
| **Boards / registry / virada** | ❌ | ❌ | ❌ | ✅ |

> **Operacional** = operador do dia a dia. **DP** = operacional + ponto facultativo + visão geral. **Admin** = administra o sistema.
> As telas `/preencher` e `/descontos` abrem por **link único (UUID)** — quem tem o link usa, sem precisar logar.

---

## 3. O que o OPERACIONAL faz (dia a dia)

### 3.1 Convocar um intermitente — Hub → **Nova convocação**
1. **Buscar empregado** (digite ≥3 letras; a lista vem do RM) → selecione.
2. **Escolher o mês** — *mês atual* ou *próximo* (só aparecem os que existem).
3. **Formulário** — solicitante, contrato, **unidade** (filtrada pelo contrato, vem do RM), datas início/fim, sábado?, insalubridade?, interior?, justificativa. Calendário travado no mês escolhido. Anexe os **termos** (convocação/insalubridade) se houver.
4. **Convocar** — cria o item no board do mês (grupo **PONTUAL**).
   - ⚠️ **Antifraude:** se já existe convocação no mesmo período, o sistema **bloqueia** e mostra o conflito.
   - Admissão e valores vêm do RM automaticamente.

### 3.2 Gerar o link de preenchimento — coluna **ativar** (no Monday)
No item da convocação, mude a coluna **"ativar"** para *ativar*. O sistema então **cria o registro no Histórico** e grava o **link `/preencher/...`** na coluna *Link* do item. Esse link é o que se usa pra registrar as ocorrências.
> O link tem **validade** (expira) — registre dentro do prazo.

### 3.3 Registrar ocorrência — abrir o **link `/preencher/...`**
- Um **modal por dia**, perguntas no positivo: *"foi trabalhar?"*, *"chegou no horário?"* (se atrasou, informe os minutos).
- **Adicionar** dias extras / **remover** dias.
- **Sábados extras** (botão azul, só se a convocação não trabalha sábado) — calendário multi-seleção; gera **boleto VT extra** ao finalizar.
- **Finalizar** → gera o **protocolo `PROT-XXXX-XXXX`** e aplica o desconto (faltas/atrasos).

### 3.4 Corrigir um registro — Hub → **Atualizar ocorrência**
Digite o protocolo `PROT-XXXX-XXXX` → reabre o preenchimento com as respostas anteriores. Salvar marca como **editado** (não duplica).

### 3.5 Cancelar convocação — no `/preencher`, ícone de cancelar
- **Total** — cancela tudo e **finaliza**.
- **Parcial** — escolhe a data de início do cancelamento; **NÃO finaliza** (o painel segue aberto pros dias não cancelados).
- O item **move** pro grupo **CANCELADOS** (total) ou **CANCELADOS PARCIAL** (parcial), e o sistema **gera o desconto** dos dias cancelados.
- ⚠️ **Cancelamento desconta sempre** — inclusive DETRAN e TRE PB.

### 3.6 Atestados / declarações — Hub → **Atestados**
1. Escolha **Intermitente** ou **CLT** (ambos buscam no RM por nome/matrícula).
2. Selecione a convocação/colaborador → preencha (tipo de documento, datas, turno, **upload** do arquivo).
3. Pode **acumular vários** documentos na sessão ("Resumo (N)") → **Concluir** envia todos (cria itens no board Controle de Atestados + anexa arquivos).
> A validação contra o ponto real (Nexti) e o eventual desconto acontecem automaticamente depois.

### 3.7 Descontos manuais (retirada Caju) — link `/descontos/...`
O link é gerado no board de Desconto. A tela pede **VR retirado** e **VT retirado** → confirma. Registra a retirada manual no item.

---

## 4. O que o DP faz (além de tudo do Operacional)

### 4.1 Ponto facultativo — desconto em massa — Hub → **Ponto facultativo** (só DP/Admin)
1. Escolha o **contrato**.
2. **Marque várias unidades** (ou **"Selecionar tudo"** — marca todas com convocados).
3. **Prosseguir** → escolha a **data** → os **benefícios** (VR e/ou VT).
4. **Pré-visualizar** (mostra todos os afetados e o total) → **Confirmar** aplica o desconto.
> ⚠️ **DETRAN e TRE PB não sofrem desconto** no ponto facultativo (aparecem com valor 0).

### 4.2 Acompanhamento
- O DP **vê a atividade de todos** os operadores (quem fez cada lançamento, quando).
- Confere os fechamentos no board do mês (grupo "Acompanhamento de Fechamento").

---

## 5. O que o ADMIN faz
- **Gerenciar contas** (painel de configuração): mudar **papel** (admin/dp/rh/operacional), **ativar/desativar** (desativar derruba a sessão na hora), redefinir **senha**.
- **Boards / registry / virada de mês**: registrar o board do mês, rodar a virada, garantir webhooks.
- Acesso a tudo do DP e do Operacional.

## 6. Virada de mês (dia 14) — o que muda pro usuário
Todo dia **14 às 17h** (quando ligada) o sistema duplica o board do mês, cria o do **próximo mês** e o repovoa com os intermitentes do RM. **Convocar funciona no mês atual E no próximo.** Os gatilhos (coluna *ativar*) são recriados automaticamente — **você não precisa fazer nada**. Se algo aparecer no board errado depois da virada, avise o responsável técnico.

## 7. Regras que afetam o trabalho (entender pra não errar)
- **Valores (VR/VT)** vêm do board Valores por **contrato + função**. VR Mensal ÷ 30 = diário; VT é diário.
- **Mobilidade × Vale-transporte (Caju):** é **mobilidade** se a coluna **`Interior?` = SIM** **ou** o contrato é **TRE PB / Barco / SEDUC INTERIOR**. Os demais (e Interior não marcado) = **vale-transporte** normal.
- **DETRAN e TRE PB NÃO descontam** por falta/atestado (a falta é declarada, desconto = 0). Mas **cancelamento desconta** (inclusive eles).
- **VR conta dias corridos** (sáb+dom) para DETRAN e TRE PB.
- **Feriado por contrato:** NACIONAL bloqueia todos; ESTADUAL/MUNICIPAL só os do contrato; **SEDUC\* e DETRAN recebem em feriado** (não bloqueiam).
- **Antifraude:** não dá pra criar 2 convocações no mesmo período pra mesma pessoa.
- **Link `/preencher` expira** — registre dentro do prazo; depois é preciso reativar.

## 8. Boas práticas / o que evitar
- **Não editar o board do mês errado** — confira se é o mês certo (atual/próximo) antes.
- **Sábado extra** só pra quem **não** trabalha sábado (o botão só aparece nesses casos).
- **Cancelamento parcial** não finaliza — lembre de lançar os dias restantes.
- Em dúvida sobre valor/desconto, confira as **regras (§7)** — DETRAN/TRE têm tratamento especial.
- Problema técnico (link não gera, board errado, erro ao finalizar) → acionar o responsável técnico (ver **Operação & Manutenção**).

function injectViewers(){
  const render=document.getElementById("render-mapa");if(!render)return;
  const codes=[...render.querySelectorAll("h2 code, h3 code, h4 code")];const used=new Set();
  MODELS.forEach(m=>{
    const code=codes.find(c=>c.textContent.trim()===m.id&&!used.has(c));
    if(!code)return;used.add(code);
    const head=code.closest("h2,h3,h4");if(!head)return;
    let node=head.nextSibling;
    while(node&&!(node.nodeType===1&&/^H[234]$/.test(node.tagName)))node=node.nextSibling;
    const host=document.createElement("div");head.parentNode.insertBefore(host,node);
    try{buildViewer(host,m);}catch(err){host.innerHTML='<div class="flowlabel">⚠ erro ao desenhar o fluxo ('+esc(err.message)+')</div>';}
  });
}
// modo PDF: mostra todas as abas empilhadas (?print=1)
var PRINT=location.search.indexOf("print")>=0;
if(PRINT){document.documentElement.classList.add("printing");document.querySelectorAll(".view").forEach(v=>v.classList.add("active"));}
injectViewers();
</script>
</body>
