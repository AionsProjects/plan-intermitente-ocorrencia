# nginx — Plano de Intermitentes (container)
# Servido em /usr/share/nginx/html (padrão do nginx:alpine).
# server_name _ aceita qualquer host: IP da VM (http://192.168.0.40),
# domínio futuro, localhost, etc.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/wasm
        font/woff2
        image/svg+xml;

    # Cache agressivo para assets do Vite (têm hash no nome)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Sem cache no index.html (pra atualização chegar rápido)
    location = /index.html {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri =404;
    }

    # Auth backend (mesma origem -> cookie first-party, sem CORS).
    # Resolve o nome do servico 'auth' via DNS interno do compose.
    location /auth/ {
        proxy_pass http://auth:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        proxy_pass http://auth:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — qualquer rota não-arquivo cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Headers de segurança básicos
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Bloquear acesso a arquivos sensíveis
    location ~ /\.(env|git|gitignore) {
        deny all;
        return 404;
    }
}
